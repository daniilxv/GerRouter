<!DOCTYPE html>
<html>
<head>
    <title>Мои путешествия - GeoRouter</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #333; text-align: center; }
        .trip-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .trip-card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .trip-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .trip-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #007bff; }
        .trip-date { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
        .trip-actions { display: flex; gap: 10px; }
        .btn { 
            text-decoration: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            text-align: center; 
            flex: 1;
            cursor: pointer;
        }
        .btn-primary { background: #007bff; color: white; border: none; }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #e9ecef; color: #333; border: 1px solid #ddd; }
        .btn-secondary:hover { background: #dee2e6; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .nav-links a { text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="{% url 'map' %}" style="text-decoration: none; font-size: 1.5rem; font-weight: bold; color: #333;">🌍 GeoRouter</a>
            <div class="nav-links">
                <a href="{% url 'map' %}">Карта</a> | 
                <a href="{% url 'logout' %}">Выйти</a>
            </div>
        </div>

        <h1>Мои путешествия</h1>
        
        {% if trips %}
            <div class="trip-list">
                {% for trip in trips %}
                    <div class="trip-card">
                        <div class="trip-name">{{ trip.name }}</div>
                        <div class="trip-date">Создано: {{ trip.created_at|date:"d.m.Y H:i" }}</div>
                        <div class="trip-actions">
                            <a href="{% url 'map' %}?trip_id={{ trip.id }}" class="btn btn-primary">Открыть</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p style="text-align: center; color: #666;">У вас пока нет сохраненных путешествий.</p>
            <div style="text-align: center; margin-top: 20px;">
                <a href="{% url 'map' %}" class="btn btn-primary" style="display: inline-block; text-decoration: none; padding: 10px 20px;">Создать первое путешествие</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
