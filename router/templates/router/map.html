{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>GeoRouter - Trip Planner</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    
    <link rel="stylesheet" href="{% static 'router/css/map.css' %}">
</head>
<body>
    <div class="auth-header">
        <a href="{% url 'trips' %}" style="text-decoration: none; color: #007bff; font-weight: bold; margin-right: 10px;">Мои путешествия</a>
        <span>Привет, <strong>{{ user.username }}</strong>!</span>
        <form action="{% url 'logout' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Выйти</button>
        </form>
    </div>

    <div class="info-panel">
        <h2 style="margin-top: 0; color: #333;">🌍 GeoRouter</h2>
        <p style="font-size: 0.9em; color: #666;">Планируйте маршруты по датам.</p>
        
        <div id="total-distance" style="margin-bottom: 5px; font-weight: bold; font-size: 1.1em; color: #007bff; padding: 10px; background: #f0f7ff; border-radius: 8px;">
            Общий путь: 0 км
        </div>
        <div id="segment-distance" style="margin-bottom: 15px; font-weight: bold; font-size: 1.1em; color: #28a745; padding: 10px; background: #f0fff4; border-radius: 8px;">
            Отрезок: 0 км
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('calendar')">📅 Календарь</button>
            <button class="tab-btn" onclick="switchTab('list')">📋 Список</button>
        </div>
        <div id="calendar-container" class="calendar-container">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="calendar-month-year" style="font-weight: bold; font-size: 0.9em;"></span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Days will be rendered here -->
            </div>
        </div>

        <div id="days-list" class="hidden" style="margin-bottom: 10px;">
            <!-- Days will be added here -->
        </div>

        <div id="day-details" class="hidden" style="margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px;">
            <h3 style="font-size: 1em; margin: 0 0 10px 0; color: #333;">Детали дня</h3>
            <label style="font-size: 0.8em; color: #666;">Комментарий к дню:</label>
            <textarea id="day-comment" style="width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box; font-family: inherit;"></textarea>
            
            <div id="points-comments-list" style="display: flex; flex-direction: column; gap: 8px;">
                <!-- Point comments will be rendered here -->
            </div>
        </div>

        <div class="controls" style="border-top: 1px solid #eee; padding-top: 20px;">
            <input type="text" id="trip-name" placeholder="Название путешествия" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box;">
            
            <div id="day-color-container" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 8px; background: #f9f9f9; border-radius: 4px; border: 1px solid #eee;">
                <label for="day-color-picker" style="font-size: 0.9em; color: #666;">Цвет дня:</label>
                <input type="color" id="day-color-picker" style="width: 40px; height: 30px; cursor: pointer; border: none; background: none;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <button onclick="saveTrip()" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">💾 Сохранить</button>
                <button onclick="clearTrip()" style="background: #dc3545; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">🗑️ Очистить</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
            </div>
        </div>
    
        <div id="point-popup" class="point-popup hidden">
            <div class="popup-content">
                <div class="popup-header">
                    <span id="popup-point-label">Точка</span>
                    <button id="popup-close" class="popup-close">&times;</button>
                </div>
                <textarea id="popup-comment" placeholder="Комментарий..."></textarea>
                <div class="popup-refuel">
                    <input type="checkbox" id="popup-refuel">
                    <label for="popup-refuel">Заправка</label>
                </div>
            </div>
        </div>
        <div class="info-panel-resizer"></div>
    </div>

    <div class="layer-switcher">
        <button class="layer-btn" onclick="toggleLayerMenu()">🗺️ Слои</button>
        <div class="layer-menu" id="layer-menu">
            <div class="layer-option active" onclick="setLayer('osm')">🗺️ Стандартная</div>
            <div class="layer-option" onclick="setLayer('satellite')">🛰️ Спутник</div>
            <div class="layer-option" onclick="setLayer('hybrid')">🌓 Гибрид</div>
            <div class="layer-option" onclick="setLayer('terrain')">⛰️ Рельеф</div>
        </div>
    </div>

    <div id="map"></div>

    <!-- OpenLayers JS -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    
    <script src="{% static 'router/js/map.js' %}?v=1.1" defer></script>
</body>
</html>
